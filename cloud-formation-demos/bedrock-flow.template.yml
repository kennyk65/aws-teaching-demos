---
Description: 'CloudFormation template to create an Amazon Bedrock Flow,ith input parameters'

Parameters:
  ModelId:
    Type: String
    Default: us.amazon.nova-micro-v1:0
    Description: The foundational model to use for the agent.  

Resources:
  BedrockFlow:
    Type: AWS::Bedrock::Flow
    Properties:
      Name: !Sub ${AWS::StackName}-CustomerFeedbackAnalyzer
      ExecutionRoleArn: !GetAtt BedrockFlowsRole.Arn
      Definition:
        Nodes:
        - Name: FlowInputNode
          Type: Input
          Inputs: []
          Configuration:
            Input: {}
          Outputs:
          - Type: String
            Name: document
        - Name: Summarizer
          Type: Prompt
          Inputs:
          - Expression: "$.data"
            Type: String
            Name: feedback_text
          Configuration:
            Prompt:
              SourceConfiguration:
                Inline:
                  InferenceConfiguration:
                    Text:
                      Temperature: 0.6
                      TopP: 0.8
                      StopSequences: []
                      MaxTokens: 512
                  TemplateConfiguration:
                    Text:
                      InputVariables:
                      - Name: feedback_text
                      Text: "Summarize the customer feedback in one concise sentence: {{feedback_text}}"
                  TemplateType: TEXT
                  ModelId: !Ref ModelId
          Outputs:
          - Type: String
            Name: modelCompletion
        - Name: FlowOutputNode
          Type: Output
          Inputs:
          - Expression: "$.data"
            Type: String
            Name: document
          Configuration:
            Output: {}
          Outputs: []
        - Name: ClassifySentiment
          Type: Prompt
          Inputs:
          - Expression: "$.data"
            Type: String
            Name: feedback_text
          Configuration:
            Prompt:
              SourceConfiguration:
                Inline:
                  InferenceConfiguration:
                    Text:
                      Temperature: 0.3
                      TopP: 0.8
                      StopSequences: []
                      MaxTokens: 32
                  TemplateConfiguration:
                    Text:
                      InputVariables:
                      - Name: feedback_text
                      Text: "Classify customer sentiment from the original feedback.\nOriginal:\n{{feedback_text}}\nReturn exactly one token: positive, neutral, or negative.\nDo not return JSON. Do not return explanations."
                  TemplateType: TEXT
                  ModelId: !Ref ModelId
          Outputs:
          - Type: String
            Name: modelCompletion
        - Name: ClassifyIntent
          Type: Prompt
          Inputs:
          - Expression: "$.data"
            Type: String
            Name: feedback_text
          Configuration:
            Prompt:
              SourceConfiguration:
                Inline:
                  InferenceConfiguration:
                    Text:
                      Temperature: 0.3
                      TopP: 0.8
                      StopSequences: []
                      MaxTokens: 64
                  TemplateConfiguration:
                    Text:
                      InputVariables:
                      - Name: feedback_text
                      Text: "Classify customer intent from the original feedback.\nOriginal:\n{{feedback_text}}\nReturn exactly one token from this set:\nbilling_issue, bug_report, feature_request, cancellation_risk, praise, other\nDo not return JSON. Do not return explanations."
                  TemplateType: TEXT
                  ModelId: !Ref ModelId
          Outputs:
          - Type: String
            Name: modelCompletion
        - Name: ClassifyUrgency
          Type: Prompt
          Inputs:
          - Expression: "$.data"
            Type: String
            Name: summary_text
          - Expression: "$.data"
            Type: String
            Name: sentiment_value
          - Expression: "$.data"
            Type: String
            Name: intent_value
          Configuration:
            Prompt:
              SourceConfiguration:
                Inline:
                  InferenceConfiguration:
                    Text:
                      Temperature: 0.3
                      TopP: 0.8
                      StopSequences: []
                      MaxTokens: 32
                  TemplateConfiguration:
                    Text:
                      InputVariables:
                      - Name: summary_text
                      - Name: sentiment_value
                      - Name: intent_value
                      Text: "Classify urgency using summary, sentiment, and intent.\nSummary:\n{{summary_text}}\nSentiment:\n{{sentiment_value}}\nIntent:\n{{intent_value}}\nReturn exactly one token: low, medium, or high.\nDo not return JSON. Do not return explanations."
                  TemplateType: TEXT
                  ModelId: !Ref ModelId
          Outputs:
          - Type: String
            Name: modelCompletion
        - Name: BuildJson
          Type: InlineCode
          Inputs:
          - Expression: "$.data"
            Type: String
            Name: summary_text
          - Expression: "$.data"
            Type: String
            Name: sentiment_value
          - Expression: "$.data"
            Type: String
            Name: intent_value
          - Expression: "$.data"
            Type: String
            Name: urgency_value
          Configuration:
            InlineCode:
              Language: Python_3
              Code: |
                import json

                result = {
                    "summary": str(summary_text).strip(),
                "sentiment": str(sentiment_value).strip().lower(),
                "intent": str(intent_value).strip().lower(),
                "urgency": str(urgency_value).strip().lower(),
                }

                json.dumps(result)
          Outputs:
          - Type: String
            Name: response
        Connections:
        - Name: InputToSummarizer
          Type: Data
          Source: FlowInputNode
          Target: Summarizer
          Configuration:
            Data:
              SourceOutput: document
              TargetInput: feedback_text
        - Name: InputToSentiment
          Type: Data
          Source: FlowInputNode
          Target: ClassifySentiment
          Configuration:
            Data:
              SourceOutput: document
              TargetInput: feedback_text
        - Name: InputToIntent
          Type: Data
          Source: FlowInputNode
          Target: ClassifyIntent
          Configuration:
            Data:
              SourceOutput: document
              TargetInput: feedback_text
        - Name: SummarizerToUrgency
          Type: Data
          Source: Summarizer
          Target: ClassifyUrgency
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: summary_text
        - Name: SentimentToUrgency
          Type: Data
          Source: ClassifySentiment
          Target: ClassifyUrgency
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: sentiment_value
        - Name: IntentToUrgency
          Type: Data
          Source: ClassifyIntent
          Target: ClassifyUrgency
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: intent_value
        - Name: SummarizerToBuildJson
          Type: Data
          Source: Summarizer
          Target: BuildJson
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: summary_text
        - Name: SentimentToBuildJson
          Type: Data
          Source: ClassifySentiment
          Target: BuildJson
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: sentiment_value
        - Name: IntentToBuildJson
          Type: Data
          Source: ClassifyIntent
          Target: BuildJson
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: intent_value
        - Name: UrgencyToBuildJson
          Type: Data
          Source: ClassifyUrgency
          Target: BuildJson
          Configuration:
            Data:
              SourceOutput: modelCompletion
              TargetInput: urgency_value
        - Name: BuildJsonToOutput
          Type: Data
          Source: BuildJson
          Target: FlowOutputNode
          Configuration:
            Data:
              SourceOutput: response
              TargetInput: document


  BedrockFlowsRole:
    Type: AWS::IAM::Role
    Properties:
      Path: "/service-role/"
      ManagedPolicyArns:
      - Ref: BedrockFlowsPolicy
      - Ref: FoundationModelPolicy
      MaxSessionDuration: 3600
      RoleName: !Sub ${AWS::StackName}-BedrockFlowsRole
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service: bedrock.amazonaws.com

  BedrockFlowsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${AWS::StackName}-BedrockFlowsPolicy
      Path: "/service-role/"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Effect: Allow
          Action: bedrock:GetFlow
          Resource: "*"
 
  FoundationModelPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub ${AWS::StackName}-FoundationModelPolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Effect: Allow
          Action: bedrock:InvokeModel
          Resource: "*"

Outputs:
  FlowUrl:
    Description: URL to access the flow in the Bedrock console
    Value: !Sub https://console.aws.amazon.com/bedrock/home?region=${AWS::Region}#/flows/${BedrockFlow.Id}/builder
