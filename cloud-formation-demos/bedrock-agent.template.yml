AWSTemplateFormatVersion: '2010-09-09'

# This creates a VERY simple BedrockAgent associated with the given foundational model.
# When you call the agent with a request like "what is the latest stock price for AAPL?", 
# the agent will respond with a hard-coded stock price.  The agent does this by
# invoking a Lambda function that you provide.  The Lambda function is responsible for
# executing the business logic to determine the stock price, but I'm just hard-coding.
# The model you select MUST BE ENABLED in Bedrock, and must be one of the models
# that works with Bedrock agents.

Parameters:
  FoundationalModel:
    Type: String
    # Default: us.anthropic.claude-sonnet-4-20250514-v1:0
    Default: us.anthropic.claude-sonnet-4-5-20250929-v1:0
    Description: The foundational model to use for the agent.  Make sure it is enabled.

Resources:
  # Create a Lambda function
  StockLookupLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-StockLookupFunction
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json
          import urllib.error
          import urllib.parse
          import urllib.request

          def _build_response(action_group, function, message, message_version):
              return {
                  'response': {
                      'actionGroup': action_group,
                      'function': function,
                      'functionResponse': {
                          'responseBody': {
                              'TEXT': {
                                  'body': message
                              }
                          }
                      }
                  },
                  'messageVersion': message_version
              }

          def _lookup_stock_price(symbol):
              # Uses Nasdaq's public quote API via the standard library only.
              url = 'https://api.nasdaq.com/api/quote/{}/info?assetclass=stocks'.format(
                  urllib.parse.quote(symbol)
              )
              request = urllib.request.Request(
                  url,
                  headers={
                      'User-Agent': 'Mozilla/5.0',
                      'Accept': 'application/json, text/plain, */*',
                      'Origin': 'https://www.nasdaq.com',
                      'Referer': 'https://www.nasdaq.com/'
                  }
              )

              with urllib.request.urlopen(request, timeout=5) as response:
                  payload = json.loads(response.read().decode('utf-8'))

              data = payload.get('data', {})
              primary_data = data.get('primaryData', {})
              last_sale_price = primary_data.get('lastSalePrice')
              currency = primary_data.get('currency') or 'USD'

              if not last_sale_price:
                  raise ValueError('Nasdaq response did not include a market price for {}'.format(symbol))

              return last_sale_price.replace('$', '').replace(',', '').strip(), currency

          def lambda_handler(event, context):
              try:
                  stock_symbol = next((parameter.get('value') for parameter in event.get('parameters', []) if parameter.get('name') == 'stockSymbol'), None)
                  if not stock_symbol:
                      raise ValueError('Missing required parameter: stockSymbol.')

                  stock_price, currency = _lookup_stock_price(stock_symbol.upper())
                  message = 'The function {} was called successfully!  The current stock price for {} is {} {}.'.format(event['function'], stock_symbol.upper(), stock_price, currency)
              except Exception as error:
                  message = 'Error: {}'.format(error)

              dummy_function_response = _build_response(event['actionGroup'], event['function'], message, event['messageVersion'])
              print('Response: {}'.format(dummy_function_response))
              return dummy_function_response

  # Create an IAM Role for the Lambda function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub ${AWS::StackName}-LambdaExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # Add a resource policy to the Lambda function allowing Bedrock to invoke it
  LambdaInvokePolicy:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StockLookupLambdaFunction
      Principal: bedrock.amazonaws.com

  # Create an IAM Role for the Bedrock Agent
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-BedrockAgentRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:*
                Resource: '*'

  # Create a simple Bedrock Guardrail to block medical-topic requests
  MedicalTopicGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      Name: !Sub ${AWS::StackName}-MedicalTopicGuardrail
      Description: Blocks prompts or responses that discuss medical topics.
      BlockedInputMessaging: I cannot discuss medical topics in this demo.
      BlockedOutputsMessaging: I cannot provide medical-topic responses in this demo.
      TopicPolicyConfig:
        TopicsConfig:
          - Name: Medical Topics
            Definition: Requests seeking medical advice, diagnosis, treatment, medication guidance, or other healthcare guidance.
            Examples:
              - What are symptoms of diabetes?
              - Which medication should I take for chest pain?
              - Diagnose this rash from my description.
              - Should I increase my blood pressure medicine dose?
            Type: DENY
            InputEnabled: true
            InputAction: BLOCK
            OutputEnabled: true
            OutputAction: BLOCK
                
  # Create an AWS Bedrock Agent
  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub ${AWS::StackName}-StockLookupAgent
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      FoundationModel: !Ref FoundationalModel
      GuardrailConfiguration:
        GuardrailIdentifier: !GetAtt MedicalTopicGuardrail.GuardrailId
        GuardrailVersion: DRAFT
      Instruction: |
        You are a helpful agent for finding information on stocks. To respond to current information, use the action group.
      ActionGroups:
      - ActionGroupName: StockLookupGroup
        Description: Group for stock lookup actions
        ActionGroupExecutor:
          Lambda: !GetAtt StockLookupLambdaFunction.Arn
        FunctionSchema:
          Functions:
          - Name: getStockPrice
            Description: Get the current stock price for a given stock symbol
            Parameters:
              stockSymbol:
                Type: string
                Required: true
                Description: stock ticker symbol to lookup

Outputs:

  BedrockAgentConsole:
    Description: The Bedrock console for the agent just constructed.
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/bedrock/home?region=${AWS::Region}#/agents/${BedrockAgent}
